appId: ${APP_ID}
env:
  APP_ID: com.raja.localstore
  TEST_PHONE: "+919182666194"
  TEST_PHONE_OTP: "123456"
---
# Chat unread badge E2E test.
# Verifies: login → Chat tab → chat list visible →
#           if unread threads exist, open the first thread →
#           chat detail marks thread read on mount →
#           go back → assert the badge for that thread is no longer visible.
#
# Prerequisite: seed data should include at least one unread message in a thread
#               for the test user. If no unread threads exist, the test still
#               passes by verifying the chat list loads cleanly.

- launchApp:
    appId: ${APP_ID}
    clearState: true

- waitForAnimationToEnd

# --- Login ---
- extendedWaitUntil:
    visible:
      text: "Phone Login"
    timeout: 30000

- tapOn:
    id: "phone-input"
- inputText: ${TEST_PHONE}

- tapOn:
    id: "send-code-button"

- extendedWaitUntil:
    visible:
      text: "Enter the 6-digit code sent to your phone"
    timeout: 15000

- tapOn:
    id: "otp-input"
- inputText: ${TEST_PHONE_OTP}

- tapOn:
    id: "verify-button"

- waitForAnimationToEnd

# --- Location permission (app-level custom button) ---
- runFlow:
    when:
      visible: "Allow Location"
    commands:
      - tapOn: "Allow Location"
      - waitForAnimationToEnd

# --- Android system dialogs (may appear 1-2 times) ---
- runFlow:
    when:
      visible: "No thanks"
    commands:
      - tapOn: "No thanks"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "No thanks"
    commands:
      - tapOn: "No thanks"
      - waitForAnimationToEnd

# --- Wait for feed to load before switching tabs ---
- extendedWaitUntil:
    visible:
      id: "merchant-card"
    timeout: 25000

# --- Navigate to Chat tab ---
- tapOn:
    id: "tab-chat"

- waitForAnimationToEnd

# --- Chat list screen must be visible ---
- extendedWaitUntil:
    visible:
      id: "chat-list-screen"
    timeout: 15000

- assertVisible:
    id: "chat-list-screen"

# ---------------------------------------------------------------------------
# Branch A: no threads yet — verify empty state and exit cleanly.
# ---------------------------------------------------------------------------
- runFlow:
    when:
      visible: "No conversations yet"
    commands:
      - assertVisible: "No conversations yet"

# ---------------------------------------------------------------------------
# Branch B: threads exist — open the first thread and verify badge clears.
# Thread rows render as Pressable with testID chat-thread-row-{uuid}.
# Because the UUID is dynamic, we use index-based tapOn on the FlatList's
# first rendered child to open whichever thread appears first.
# After the detail screen marks the thread read, we navigate back and assert
# that "No conversations yet" is NOT the only content (list still visible) and
# the previously visible badge count text is gone from the first row area.
# ---------------------------------------------------------------------------
- runFlow:
    when:
      NOT:
        visible: "No conversations yet"
    commands:
      # Tap the first thread row in the list (index 0 within the FlatList).
      - tapOn:
          id: "chat-list-screen"
          childIndex: 0

      - waitForAnimationToEnd

      # Chat detail screen opens.
      - extendedWaitUntil:
          visible:
            id: "chat-detail-screen"
          timeout: 15000

      - assertVisible:
          id: "chat-detail-screen"

      # markRead fires on mount — allow network round-trip to complete.
      - waitForAnimationToEnd

      # --- Go back to chat list ---
      - back

      - waitForAnimationToEnd

      # Chat list re-appears.
      - extendedWaitUntil:
          visible:
            id: "chat-list-screen"
          timeout: 10000

      - assertVisible:
          id: "chat-list-screen"

      # The thread we just opened should no longer show an unread badge.
      # We assert the badge is NOT visible by checking for the absence of
      # a bold unread count label (the badge renders a number > 0).
      # Maestro assertNotVisible checks the element is absent from the hierarchy.
      - assertNotVisible:
          text: "99+"
